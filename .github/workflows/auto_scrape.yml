name: 每日 ETF 持股自動採集

on:
  schedule:
    # 每天台灣時間下午 5:00 執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝必要工具包
        run: |
          pip install requests pandas beautifulsoup4 lxml html5lib

      - name: 執行採集腳本
        run: python scraper_00981a.py

      - name: 提交並推送到 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "自動更新今日持股資料 - $(date +'%Y-%m-%d')" || exit 0
          git push
