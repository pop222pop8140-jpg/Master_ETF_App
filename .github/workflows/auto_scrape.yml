name: 每日 ETF 持股自動採集

on:
  schedule:
    # 每天台灣時間下午 5:00 執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許主人隨時手動點擊執行

# 🌸 給予小管家寫入檔案的權限，這是自動更新檔案的關鍵！
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝必要工具包
        run: |
          pip install requests pandas openpyxl

      - name: 執行全能大管家腳本
        run: python crawler.py

      - name: 提交並推送到 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 🕵️‍♀️ 小粉偵測雷達：檢查是否有新產出的 CSV 檔案
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "自動更新今日持股資料 - $(date +'%Y-%m-%d')"
            git push
          else
            echo "🌸 回報主人：今天 API 還沒更新資料，暫時不進行推送喔！"
          fi
