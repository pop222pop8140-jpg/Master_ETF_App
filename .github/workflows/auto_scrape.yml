name: 每日 ETF 持股自動採集

on:
  schedule:
    # 每天台灣時間下午 5:00 執行 (UTC 9:00)
    - cron: '0 9 * * *'
  workflow_dispatch: # 允許手動點擊執行

# 🌸 這裡是關鍵！給予小管家寫入檔案的權限
permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出代碼
        uses: actions/checkout@v4 # 順便升級到最新版，解決截圖中的警告

      - name: 設定 Python 環境
        uses: actions/setup-python@v5 # 順便升級最新版
        with:
          python-version: '3.10'

      - name: 安裝必要工具包
        run: |
          pip install requests pandas beautifulsoup4 lxml html5lib

      - name: 執行採集腳本
        run: python scraper_00981a.py

      - name: 提交並推送到 GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          # 檢查是否有檔案變更，避免空提交報錯
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "自動更新今日持股資料 - $(date +'%Y-%m-%d')"
            git push
          else
            echo "沒有偵測到資料更新，跳過推送。"
          fi
